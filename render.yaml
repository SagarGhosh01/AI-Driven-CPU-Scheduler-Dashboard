services:
  - type: web
    name: cpu-scheduler-backend
    runtime: native
    
    buildCommand: |
      mkdir -p build && \
      cd build && \
      cmake .. && \
      make Server
    
    startCommand: ./build/Server
    
    envVars:
      - key: PORT
        value: 5000
      - key: HOST
        value: 0.0.0.0
    
    # Resource specifications
    plan: standard
    
    # Health check
    healthCheckPath: /
    healthCheckInterval: 30
    healthCheckTimeout: 5
